<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Memlord — Email verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #0b0b14; color: #e2e8f0; display: flex; align-items: center;
               justify-content: center; min-height: 100vh; -webkit-font-smoothing: antialiased; padding: 1.5rem; }
        .wrap { width: 100%; max-width: 380px; }
        .brand { display: flex; align-items: center; justify-content: center;
                 gap: 0.625rem; margin-bottom: 2rem; }
        .brand-icon { width: 36px; height: 36px;
            background: linear-gradient(135deg, #911af3 0%, #7c3aed 100%);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1rem; font-weight: 700; line-height: 1; }
        .brand-name { font-size: 1.25rem; font-weight: 700; color: #e2e8f0; letter-spacing: -0.025em; }
        .card { background: #15152a; border: 1px solid #1f1f38; border-radius: 14px;
            padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,.4), 0 2px 4px -2px rgba(0,0,0,.3);
            text-align: center; }
        .heading { font-size: 1rem; font-weight: 600; color: #e2e8f0; margin-bottom: 0.5rem; }
        .sub { font-size: 0.8125rem; color: #8b8fa8; margin-bottom: 1.25rem; }
        .success { padding: 0.625rem 0.875rem; background: rgba(74,222,128,.1);
            border: 1px solid rgba(74,222,128,.3); border-radius: 6px;
            color: #4ade80; font-size: 0.8125rem; margin-bottom: 1.25rem; }
        .error { padding: 0.625rem 0.875rem; background: rgba(239,68,68,.12);
            border: 1px solid rgba(239,68,68,.3); border-radius: 6px;
            color: #f87171; font-size: 0.8125rem; margin-bottom: 1.25rem; }
        .link { color: #a78bfa; text-decoration: none; font-weight: 500; font-size: 0.8125rem; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-icon">M</div>
        <span class="brand-name">Memlord</span>
    </div>
    <div class="card">
        {% if success %}
        <div class="heading">Email verified</div>
        <div class="sub">Your email address has been confirmed.</div>
        <div class="success">All done! Your account is fully verified.</div>
        <a href="{{ root_path }}/" class="link">Go to Memlord →</a>
        {% elif error %}
        <div class="heading">Verification failed</div>
        <div class="error">{{ error }}</div>
        <a href="{{ root_path }}/" class="link">Back to home</a>
        {% else %}
        <div class="heading">Email verification</div>
        <div class="sub">Check your inbox for a verification link.</div>
        <a href="{{ root_path }}/" class="link">Back to home</a>
        {% endif %}
    </div>
</div>
</body>
</html>
