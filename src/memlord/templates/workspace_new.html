{% extends "base.html" %}
{% block title %}New Workspace — Memlord{% endblock %}
{% block content %}

<div class="breadcrumb">
    <a href="{{ root_path }}/ui/workspaces" class="btn btn-ghost btn-sm">← Workspaces</a>
</div>

<div class="detail-card" style="max-width:480px" x-data="newWorkspacePage()">

    <h1 class="page-title" style="margin-bottom:1.25rem">New workspace</h1>

    <div x-show="error" class="alert alert-error" x-text="error"></div>

    <form @submit.prevent="submit()">
        <div class="form-group">
            <label class="form-label" for="name">Name</label>
            <input class="form-input" id="name" type="text"
                   placeholder="e.g. Team Shared Notes" autofocus
                   x-model="name">
        </div>
        <div class="form-group">
            <label class="form-label" for="description">
                Description <span style="color:var(--text-4);font-weight:400">(optional)</span>
            </label>
            <textarea class="form-input" id="description" rows="3"
                      placeholder="What is this workspace for? What kind of memories go here?"
                      x-model="description"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create</button>
            <a href="{{ root_path }}/ui/workspaces" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>

<script>
function newWorkspacePage() {
    return {
        name: '',
        description: '',
        error: '',

        async submit() {
            this.error = '';
            const r = await fetch(rootPath + '/api/workspaces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: this.name.trim(), description: this.description.trim() || null }),
            });
            if (r.ok) {
                const ws = await r.json();
                window.location.href = rootPath + '/ui/workspaces/' + ws.id;
            } else {
                const e = await r.json();
                this.error = e.detail || 'Failed to create workspace.';
            }
        },
    };
}
</script>

{% endblock %}
